<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional XO Multiplayer - Tic-Tac-Toe</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow-x: hidden;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { margin: 0 0 20px; font-size: 2em; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .room-section, .game-section {
            margin: 20px 0;
        }
        input { 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1em; 
            width: 150px; 
            margin-right: 10px;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            font-weight: bold;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #status { font-size: 1.4em; margin: 20px 0; font-weight: bold; }
        #scores { display: flex; justify-content: space-around; margin: 10px 0; font-size: 1.2em; }
        .score { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 15px; }
        .leaderboard-section { margin: 20px 0; }
        .leaderboard-section h3 { margin: 0 0 10px; }
        #leaderboardList { list-style: none; padding: 0; max-height: 150px; overflow-y: auto; }
        #leaderboardList li { background: rgba(255,255,255,0.2); margin: 5px 0; padding: 10px; border-radius: 10px; }
        #nameModal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; 
        }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; text-align: center; }
        .modal-content input { margin: 10px; }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.9);
            border: none;
            font-size: 3em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 15px;
            transition: all 0.3s ease;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .cell.x { color: #e74c3c; }
        .cell.o { color: #3498db; }
        .cell:disabled { cursor: not-allowed; opacity: 0.7; }
        .win-animation { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #feca57;
            animation: confetti-fall 3s linear infinite;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .hidden { display: none; }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5em; }
            #board { gap: 8px; padding: 15px; }
            .cell { font-size: 2.5em; }
        }
    </style>
</head>
<body>
<div class="container">
        <h1>🏆 XO Multiplayer Pro</h1>
        <div id="leaderboardSection" class="leaderboard-section">
            <h3>🏆 Leaderboard</h3>
            <ul id="leaderboardList"></ul>
        </div>
        <div id="nicknameSection" class="room-section">
            <h4>Enter your nickname:</h4>
            <input type="text" id="nickname" placeholder="Nickname" maxlength="20">
        </div>
        <div id="roomSection" class="room-section">
            <button id="createRoom">Create Room</button>
            <br><br>
            <input type="text" id="roomCode" placeholder="Enter 4-digit room code" maxlength="4">
            <button id="joinRoom">Join Room</button>
            <div id="roomInfo"></div>
        </div>
        <div id="gameSection" class="game-section hidden">
            <div id="scores">
                <div class="score">X: <span id="scoreX">0</span></div>
                <div class="score">O: <span id="scoreO">0</span></div>
            </div>
            <div id="status">Waiting for players...</div>
            <div id="board"></div>
            <button id="reset">New Game</button>
            <div id="playerSymbol"></div>
        </div>
    </div>
    <div id="nameModal">
        <div class="modal-content">
            <h3>Congratulations! Enter your name for Leaderboard:</h3>
            <input type="text" id="playerName" placeholder="Your name" maxlength="20">
            <br>
            <button id="submitName">Submit</button>
        </div>
    </div>
    <canvas id="confetti"></canvas>

    <script>
        const socket = io('http://localhost:3000', {
            transports: ['websocket'],
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: 10
        });
        let roomCode = '';
        let playerSymbol = '';
        let board = [];
        let currentPlayer = '';
        let gameActive = true;
        let scores = { X: 0, O: 0 };
        let isConnected = false;

        const elements = {
            leaderboardList: document.getElementById('leaderboardList'),
            nicknameInput: document.getElementById('nickname'),
            nameModal: document.getElementById('nameModal'),
            playerName: document.getElementById('playerName'),
            submitNameBtn: document.getElementById('submitName'),
            roomSection: document.getElementById('roomSection'),
            gameSection: document.getElementById('gameSection'),
            status: document.getElementById('status'),
            boardEl: document.getElementById('board'),
            resetBtn: document.getElementById('reset'),
            scoreX: document.getElementById('scoreX'),
            scoreO: document.getElementById('scoreO'),
            playerSymbol: document.getElementById('playerSymbol'),
            roomInfo: document.getElementById('roomInfo'),
            createBtn: document.getElementById('createRoom'),
            joinBtn: document.getElementById('joinRoom'),
            roomInput: document.getElementById('roomCode')
        };

        let nickname = '';

        console.log('Page loaded');
        console.log('Attempting to connect to socket.io server');

        socket.on('connect', () => {
            isConnected = true;
            console.log('Connected to server');
            console.log('Socket ID:', socket.id);
            elements.roomInfo.textContent = '';
        });

        socket.on('disconnect', () => {
            isConnected = false;
            console.log('Disconnected from server');
        });

        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            console.error('Error details:', error.message);
            elements.roomInfo.textContent = `Connection Error: ${error.message || error}. Retrying...`;
        });

        socket.on('error', (error) => {
            console.error('Socket error:', error);
        });

        elements.createBtn.addEventListener('click', () => {
            if (!isConnected) {
                elements.roomInfo.textContent = 'Not connected to server. Please refresh page and ensure backend is running.';
                return;
            }
            nickname = elements.nicknameInput.value.trim() || 'Anonymous';
            if (!nickname) {
                elements.roomInfo.textContent = 'Please enter a nickname.';
                return;
            }
            socket.emit('createRoom', nickname);
        });
        elements.joinBtn.addEventListener('click', () => {
            if (!isConnected) {
                elements.roomInfo.textContent = 'Not connected to server. Please refresh page and ensure backend is running.';
                return;
            }
            const code = elements.roomInput.value.trim().toUpperCase();
            nickname = elements.nicknameInput.value.trim() || 'Anonymous';
            if (!nickname) {
                elements.roomInfo.textContent = 'Please enter a nickname.';
                return;
            }
            if (code.length !== 4) {
                elements.roomInfo.textContent = 'Please enter a valid 4-digit room code.';
                return;
            }
            socket.emit('joinRoom', { code, nickname });
        });

        elements.submitNameBtn.addEventListener('click', () => {
            const name = elements.playerName.value.trim();
            if (name) {
                socket.emit('submitName', { name });
                elements.nameModal.style.display = 'none';
                elements.playerName.value = '';
            }
        });

        elements.resetBtn.addEventListener('click', () => socket.emit('resetGame', roomCode));

        socket.on('roomCreated', (code) => {
            roomCode = code;
            elements.roomInfo.textContent = `Room created! Code: ${code}. Share with friend.`;
        });

        socket.on('roomReady', (code, player) => {
            roomCode = code;
            elements.roomSection.classList.add('hidden');
            elements.gameSection.classList.remove('hidden');
        });

        socket.on('playerAssigned', (symbol) => {
            playerSymbol = symbol;
            elements.playerSymbol.textContent = `You are ${symbol}`;
        });

        socket.on('roomUpdate', (room) => {
            board = room.board;
            currentPlayer = room.currentPlayer;
            scores = room.scores;
            gameActive = room.active;
            updateUI();
        });

        socket.on('gameOver', (data) => {
            if (data.win && data.winner === playerSymbol) {
                elements.nameModal.style.display = 'flex';
            } else if (data.win) {
                elements.status.textContent = `${data.winner} Wins! 🎉`;
                confetti();
            } else {
                elements.status.textContent = 'Draw!';
            }
            updateScores();
        });

        socket.on('leaderboardUpdate', (top10) => {
            elements.leaderboardList.innerHTML = top10.map((entry, index) => 
                `<li>${index + 1}. ${entry.name}: ${entry.wins} wins</li>`
            ).join('');
        });
        socket.on('requestName', () => {
            elements.nameModal.style.display = 'flex';
        });

        socket.on('roomInactive', () => {
            elements.status.textContent = 'Room inactive. Create new.';
        });

        socket.on('joinError', (msg) => {
            elements.roomInfo.textContent = msg;
        });

        function updateUI() {
            elements.status.textContent = `Turn: ${currentPlayer}`;
            renderBoard();
            elements.resetBtn.disabled = !gameActive;
        }

        function renderBoard() {
            elements.boardEl.innerHTML = '';
            board.forEach((cell, index) => {
                const btn = document.createElement('button');
                btn.classList.add('cell');
                if (cell) {
                    btn.textContent = cell;
                    btn.classList.add(cell.toLowerCase());
                    btn.disabled = true;
                } else {
                    btn.dataset.index = index;
                    btn.addEventListener('click', () => socket.emit('makeMove', { code: roomCode, index }));
                    if (!gameActive || currentPlayer !== playerSymbol) btn.disabled = true;
                }
                elements.boardEl.appendChild(btn);
            });
        }

        function updateScores() {
            elements.scoreX.textContent = scores.X;
            elements.scoreO.textContent = scores.O;
        }

        function confetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 100; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
                piece.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 3000);
            }
        }

        renderBoard();
    </script>
</body>
</html>
